server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        # ─── Member 1: Patient Service ────────────────────────────────────────
        - id: patient-service
          uri: http://patient-service:8081
          predicates:
            - Path=/gateway/patients/**
          filters:
            - RewritePath=/gateway/patients/(?<segment>.*), /api/patients/${segment}

        # ─── Member 2: Doctor Service ─────────────────────────────────────────
        - id: doctor-service
          uri: http://doctor-service:8082
          predicates:
            - Path=/gateway/doctors/**
          filters:
            - RewritePath=/gateway/doctors/(?<segment>.*), /api/doctors/${segment}

        # ─── Member 3: Appointment Service ────────────────────────────────────
        - id: appointment-service
          uri: http://appointment-service:8083
          predicates:
            - Path=/gateway/appointments/**
          filters:
            - RewritePath=/gateway/appointments/(?<segment>.*), /api/appointments/${segment}

        # ─── Member 4: Pharmacy Service ───────────────────────────────────────
        - id: pharmacy-service
          uri: http://pharmacy-service:8084
          predicates:
            - Path=/gateway/medicines/**
          filters:
            - RewritePath=/gateway/medicines/(?<segment>.*), /api/medicines/${segment}

        # ─── Member 5: Billing Service ────────────────────────────────────────
        - id: billing-service
          uri: http://billing-service:8085
          predicates:
            - Path=/gateway/invoices/**
          filters:
            - RewritePath=/gateway/invoices/(?<segment>.*), /api/invoices/${segment}

        # ─── Member 6: Lab Test Service ───────────────────────────────────────
        - id: labtest-service
          uri: http://labtest-service:8086
          predicates:
            - Path=/gateway/labtests/**
          filters:
            - RewritePath=/gateway/labtests/(?<segment>.*), /api/labtests/${segment}

        # ─── Swagger API-docs proxy routes ────────────────────────────────────
        - id: patient-docs
          uri: http://patient-service:8081
          predicates:
            - Path=/patient-docs/**
          filters:
            - RewritePath=/patient-docs/(?<segment>.*), /${segment}

        - id: doctor-docs
          uri: http://doctor-service:8082
          predicates:
            - Path=/doctor-docs/**
          filters:
            - RewritePath=/doctor-docs/(?<segment>.*), /${segment}

        - id: appointment-docs
          uri: http://appointment-service:8083
          predicates:
            - Path=/appointment-docs/**
          filters:
            - RewritePath=/appointment-docs/(?<segment>.*), /${segment}

        - id: pharmacy-docs
          uri: http://pharmacy-service:8084
          predicates:
            - Path=/pharmacy-docs/**
          filters:
            - RewritePath=/pharmacy-docs/(?<segment>.*), /${segment}

        - id: billing-docs
          uri: http://billing-service:8085
          predicates:
            - Path=/billing-docs/**
          filters:
            - RewritePath=/billing-docs/(?<segment>.*), /${segment}

        - id: labtest-docs
          uri: http://labtest-service:8086
          predicates:
            - Path=/labtest-docs/**
          filters:
            - RewritePath=/labtest-docs/(?<segment>.*), /${segment}

      # CORS for React frontend
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://hms-frontend:3000"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: Patient Service
        url: /patient-docs/api-docs
      - name: Doctor Service
        url: /doctor-docs/api-docs
      - name: Appointment Service
        url: /appointment-docs/api-docs
      - name: Pharmacy Service
        url: /pharmacy-docs/api-docs
      - name: Billing Service
        url: /billing-docs/api-docs
      - name: Lab Test Service
        url: /labtest-docs/api-docs
